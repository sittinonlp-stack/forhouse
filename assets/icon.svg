<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151f1b"/>
      <stop offset="100%" stop-color="#07090a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Glow under house -->
  <ellipse cx="256" cy="444" rx="188" ry="24" fill="#22c55e" opacity="0.18"/>

  <!-- House walls -->
  <rect x="96" y="256" width="320" height="184" rx="8" fill="#1a2a1e"/>

  <!-- Roof (filled triangle) -->
  <polygon points="256,76 44,272 468,272" fill="#22c55e" opacity="0.18"/>
  <!-- Roof outline -->
  <polyline points="44,272 256,76 468,272"
    fill="none" stroke="#4ade80" stroke-width="28"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wall border -->
  <rect x="96" y="256" width="320" height="184" rx="8"
    fill="none" stroke="#22c55e" stroke-width="18"/>

  <!-- Door (arch) -->
  <path d="M212 440 L212 336 A44 44 0 0 1 300 336 L300 440 Z"
    fill="#22c55e" opacity="0.85"/>

  <!-- Left window -->
  <rect x="118" y="290" width="70" height="58" rx="10"
    fill="#22c55e" opacity="0.22"/>
  <rect x="118" y="290" width="70" height="58" rx="10"
    fill="none" stroke="#22c55e" stroke-width="12"/>

  <!-- Right window -->
  <rect x="324" y="290" width="70" height="58" rx="10"
    fill="#22c55e" opacity="0.22"/>
  <rect x="324" y="290" width="70" height="58" rx="10"
    fill="none" stroke="#22c55e" stroke-width="12"/>

  <!-- Chimney -->
  <rect x="318" y="108" width="34" height="84" rx="6" fill="#22c55e" opacity="0.7"/>
  <rect x="312" y="98" width="46" height="22" rx="6" fill="#4ade80" opacity="0.8"/>
</svg>
